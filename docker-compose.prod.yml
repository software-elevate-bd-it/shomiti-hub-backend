version: '3.9'

services:
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: somitee_hq
      MYSQL_USER: somitee
      MYSQL_PASSWORD: somitee_password
      MYSQL_ROOT_PASSWORD: root_password
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npx prisma migrate deploy && npm run start:prod"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://somitee:somitee_password@mysql:3306/somitee_hq
      REDIS_HOST: redis
      JWT_SECRET: '${JWT_SECRET}'
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start:worker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://somitee:somitee_password@mysql:3306/somitee_hq
      REDIS_HOST: redis
      JWT_SECRET: '${JWT_SECRET}'
      NODE_ENV: production
    restart: always
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M

  adminer:
    image: adminer
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
